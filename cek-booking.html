<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes"/>
  <title>Cek Booking – Jogja Rafting</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f1ef;
      --surface: #ffffff;
      --ink: #111827;
      --ink-2: #374151;
      --ink-3: #6b7280;
      --ink-4: #9ca3af;
      --ink-5: #d1d5db;
      --accent: #111827;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
      --nav-h: 76px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    .app-shell {
      display: flex;
      width: 100%;
      min-height: 100%;
    }

    /* ===== SIDEBAR (desktop only) ===== */
    .sidebar {
      display: none;
    }

    @media (min-width: 1024px) {
      .sidebar {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        width: 80px;
        min-height: 100vh;
        background: var(--surface);
        box-shadow: 1px 0 0 var(--ink-5);
        padding: 28px 0;
        flex-shrink: 0;
        z-index: 50;
        position: sticky;
        top: 0;
        height: 100vh;
      }

      .sidebar-logo {
        font-family: 'Syne', sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 2px;
        color: var(--ink);
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        text-decoration: none;
      }

      .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
      }

      .sidebar-nav-item {
        width: 46px;
        height: 46px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
        text-decoration: none;
      }

      .sidebar-nav-item.active { background: var(--ink); }
      .sidebar-nav-item.active svg { stroke: #fff; }
      .sidebar-nav-item:not(.active) svg { stroke: var(--ink-4); }
      .sidebar-nav-item:not(.active):hover { background: var(--bg); }

      .sidebar-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, #374151, #111827);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
    }

    /* ===== MAIN AREA ===== */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ===== CENTERED CONTENT ===== */
    .page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px calc(var(--nav-h) + env(safe-area-inset-bottom, 16px) + 20px);
    }

    @media (min-width: 640px) {
      .page-content { padding: 40px 32px calc(var(--nav-h) + 20px); }
    }

    @media (min-width: 1024px) {
      .page-content {
        padding: 40px;
        min-height: 100vh;
      }
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-3);
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .header-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 800;
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 12px;
    }

    .header-sub {
      font-size: 14px;
      color: var(--ink-4);
      font-weight: 400;
      line-height: 1.6;
    }

    /* ===== FORM CARD ===== */
    .form-card {
      background: var(--surface);
      border-radius: 28px;
      padding: 32px 28px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      width: 100%;
      max-width: 440px;
    }

    @media (min-width: 640px) {
      .form-card { padding: 36px 36px; }
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-2);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--ink-4);
    }

    .form-input {
      width: 100%;
      padding: 14px 16px 14px 42px;
      border: 1.5px solid var(--ink-5);
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      background: var(--bg);
      transition: all 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--ink-3);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(17,24,39,0.05);
    }

    .form-input::placeholder {
      color: var(--ink-4);
      font-weight: 400;
    }

    .btn-primary {
      width: 100%;
      padding: 16px 24px;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: 16px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #1f2937;
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .btn-primary:disabled {
      background: var(--ink-5);
      cursor: not-allowed;
    }

    /* ===== ERROR ===== */
    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
    }

    .alert-error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    /* ===== MODAL OVERLAY ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    @media (min-width: 640px) {
      .modal-overlay {
        align-items: center;
        padding: 20px;
      }
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      width: 100%;
      max-width: 520px;
      max-height: 92vh;
      border-radius: 28px 28px 0 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transform: translateY(40px);
      transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
      position: relative;
      scroll-behavior: smooth;
    }

    @media (min-width: 640px) {
      .modal {
        border-radius: 28px;
        transform: translateY(20px) scale(0.97);
        transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
      }
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    /* Drag handle (mobile) */
    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--ink-5);
      border-radius: 2px;
      margin: 14px auto 0;
    }

    @media (min-width: 640px) {
      .modal-handle { display: none; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--ink-5);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 10;
      border-radius: 28px 28px 0 0;
    }

    @media (min-width: 640px) {
      .modal-header { border-radius: 28px 28px 0 0; }
    }

    .modal-title-group { flex: 1; }

    .modal-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-4);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--ink);
    }

    .modal-close {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--bg);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .modal-close:hover {
      background: var(--ink-5);
    }

    .modal-body {
      padding: 20px 24px 32px;
    }

    /* ===== BOOKING DETAIL INSIDE MODAL ===== */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .booking-id {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--ink-3);
      letter-spacing: 1px;
    }

    .status-badge {
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .status-confirmed { background: #d1fae5; color: #065f46; }
    .status-pending   { background: #fef3c7; color: #92400e; }

    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .info-tile {
      background: var(--bg);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .info-tile.full { grid-column: 1 / -1; }

    .info-tile-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-4);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .info-tile-value {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.3;
    }

    .divider {
      height: 1px;
      background: var(--ink-5);
      margin: 18px 0;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-2);
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .payment-rows { display: flex; flex-direction: column; gap: 8px; }

    .pay-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .pay-label { color: var(--ink-4); font-weight: 500; }
    .pay-value { color: var(--ink); font-weight: 600; }
    .pay-value.green { color: #059669; }
    .pay-value.red   { color: #dc2626; }
    .pay-value.amber { color: #d97706; }

    .total-strip {
      background: var(--ink);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    .total-label {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
    }

    .total-value {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
    }

    .contact-strip {
      margin-top: 16px;
      padding: 12px 16px;
      background: #f0fdf4;
      border-radius: 12px;
      font-size: 12px;
      color: #065f46;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== BOTTOM NAV (mobile + tablet) ===== */
    .bottom-nav-wrapper {
      display: block;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 20px;
      padding-bottom: max(14px, env(safe-area-inset-bottom, 14px));
      z-index: 100;
      pointer-events: none;
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .bottom-nav-wrapper {
        padding-bottom: calc(14px + env(safe-area-inset-bottom));
      }
    }

    .bottom-nav {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      border-radius: 99px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.07);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      pointer-events: all;
    }

    @media (min-width: 640px) {
      .bottom-nav { max-width: 560px; padding: 12px 32px; }
    }

    @media (min-width: 1024px) {
      .bottom-nav-wrapper { display: none; }
    }

    .nav-item {
      width: 46px; height: 46px;
      border-radius: 99px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nav-item.active { background: var(--ink); }
    .nav-item.active svg { stroke: white; }
    .nav-item:not(.active) svg { stroke: var(--ink-4); }

    /* No scrollbar utility */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app-shell">

    <!-- ===== SIDEBAR (desktop) - menggunakan <a href> ===== -->
    <aside class="sidebar">
        <a href="index.html" class="sidebar-logo">JOGJA RAFTING</a>

            </svg>
        </a>
        </nav>
    </aside>

  <!-- ===== MAIN AREA ===== -->
  <main class="main-area">
    <div class="page-content">

      <!-- HEADER -->
      <div class="header">
        <div class="header-label">JOGJA RAFTING</div>
        <div class="header-title">Cek Booking</div>
        <div class="header-sub">Masukkan kode booking dan nama<br/>untuk melihat detail pemesanan Anda.</div>

      <div class="form-card">

                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </span>
            <input id="bookingCode" type="text" class="form-input" placeholder="Contoh: JR-2024-001" autocomplete="off" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="customerName">Nama Pemesan</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input id="customerName" type="text" class="form-input" placeholder="Masukkan nama lengkap" autocomplete="off" />
          </div>
        </div>
        <button class="btn-primary" id="searchBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span id="searchBtnText">Cari Booking</span>

        <div id="errorAlert" class="alert alert-error hidden">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="errorText"></span>

    </div><!-- /page-content -->

    <!-- ===== BOTTOM NAV (mobile & tablet) ===== -->
    <div class="bottom-nav-wrapper">
      <nav class="bottom-nav" id="bottomNav"></nav>

</div><!-- /app-shell -->

<!-- ===== MODAL ===== -->
<div class="modal-overlay no-scrollbar" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalBookingTitle">

    <div class="modal-handle"></div>

        <div class="modal-label">Detail Pemesanan</div>

      <button class="modal-close" id="modalCloseBtn" aria-label="Tutup modal">

    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

    {
      bookingCode: 'JR-2024-003',
      customerName: 'Ahmad Fauzi',
      packageName: 'VW Safari Merapi',
      date: '25 Januari 2025',
      jamMulai: '07.00 WIB',
      participants: 6,
      pricePerPerson: 'Rp 400.000',
      subtotal: 'Rp 2.400.000',
      discount: '20% (VWSAFARI)',
      discountAmount: 'Rp 480.000',
      total: 'Rp 1.920.000',
      paidAmount: 'Rp 1.920.000',
      remaining: 'Rp 0',
      status: 'Lunas'
    }
  ];

  // --- DOM refs ---
  const bookingCodeEl = document.getElementById('bookingCode');
  const customerNameEl = document.getElementById('customerName');
  const searchBtn = document.getElementById('searchBtn');
  const searchBtnText = document.getElementById('searchBtnText');
  const errorAlert = document.getElementById('errorAlert');
  const errorText = document.getElementById('errorText');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalCloseBtn = document.getElementById('modalCloseBtn');
  const modalBody = document.getElementById('modalBody');
  const modalBookingTitle = document.getElementById('modalBookingTitle');

  // --- Nav SVGs ---
  function getNavSVG(id, active) {
    const s = active ? 'white' : '#9ca3af';
    const paths = {
      home: `<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`,
      explore: `<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>`,
      booking: `<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,
      contact: `<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>`
    };
    return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${s}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${paths[id] || ''}</svg>`;
  }

  function renderBottomNav() {
    const nav = document.getElementById('bottomNav');
    nav.innerHTML = '';
    navItems.forEach(n => {
      const isActive = n.id === 'booking';
      const div = document.createElement('div');
      div.className = 'nav-item' + (isActive ? ' active' : '');
      div.innerHTML = getNavSVG(n.id, isActive);
      nav.appendChild(div);
    });
  }

  // --- Button state ---
  function updateBtn() {
    const ok = bookingCodeEl.value.trim().length >= 3 && customerNameEl.value.trim().length >= 3;
    searchBtn.disabled = !ok;
  }

  // --- Clear error ---
  function clearError() {
    errorAlert.classList.add('hidden');
    errorText.textContent = '';
  }

  // --- Open modal ---
  function openModal(b) {
    const isLunas = b.status === 'Lunas';
    const statusClass = isLunas ? 'status-confirmed' : 'status-pending';
    const statusText = isLunas ? '✅ Lunas' : '⏳ DP 50%';

    modalBookingTitle.textContent = b.bookingCode;

    modalBody.innerHTML = `
      <div class="status-row">
        <span class="booking-id">${b.bookingCode}</span>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>

      <div class="info-grid">
        <div class="info-tile full">
          <div class="info-tile-label">Paket</div>
          <div class="info-tile-value">${b.packageName}</div>
        </div>
        <div class="info-tile">
          <div class="info-tile-label">Tanggal</div>
          <div class="info-tile-value">${b.date}</div>
        </div>
        <div class="info-tile">
          <div class="info-tile-label">Jam Mulai</div>
          <div class="info-tile-value">${b.jamMulai}</div>
        </div>
        <div class="info-tile">
          <div class="info-tile-label">Peserta</div>
          <div class="info-tile-value">${b.participants} orang</div>
        </div>
        <div class="info-tile">
          <div class="info-tile-label">Pemesan</div>
          <div class="info-tile-value">${b.customerName}</div>
        </div>
      </div>

      <div class="divider"></div>
      <div class="section-title">💳 Detail Pembayaran</div>
      <div class="payment-rows">
        <div class="pay-row">
          <span class="pay-label">Harga per orang</span>
          <span class="pay-value">${b.pricePerPerson}</span>
        </div>
        <div class="pay-row">
          <span class="pay-label">Subtotal (${b.participants} orang)</span>
          <span class="pay-value">${b.subtotal}</span>
        </div>
        ${b.discount ? `
        <div class="pay-row">
          <span class="pay-label">Diskon (${b.discount})</span>
          <span class="pay-value green">- ${b.discountAmount}</span>
        </div>` : ''}
      </div>

      <div class="total-strip">
        <span class="total-label">Total</span>
        <span class="total-value">${b.total}</span>
      </div>

      ${!isLunas ? `
      <div class="payment-rows" style="margin-top: 14px;">
        <div class="pay-row">
          <span class="pay-label">Sudah Dibayar (DP)</span>
          <span class="pay-value amber">${b.paidAmount}</span>
        </div>
        <div class="pay-row">
          <span class="pay-label">Sisa Pembayaran</span>
          <span class="pay-value red">${b.remaining}</span>
        </div>
      </div>` : `
      <div class="payment-rows" style="margin-top: 14px;">
        <div class="pay-row">
          <span class="pay-label">Status Bayar</span>
          <span class="pay-value green">✔ Pembayaran Lunas</span>
        </div>
      </div>`}

      <div class="contact-strip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        Info lebih lanjut hubungi: <strong>+62 812-3456-7890</strong>
      </div>
    `;

    // scroll modal to top
    document.getElementById('modal').scrollTop = 0;

    modalOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  // --- Close modal (only via X button) ---
  function closeModal() {
    modalOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  // --- Search ---
  let isLoading = false;

  function checkBooking() {
    const code = bookingCodeEl.value.trim();
    const name = customerNameEl.value.trim();
    if (code.length < 3 || name.length < 3 || isLoading) return;

    isLoading = true;
    clearError();
    searchBtn.disabled = true;
    searchBtnText.textContent = '⏳ Mencari...';

    setTimeout(() => {
      const found = mockBookings.find(
        b => b.bookingCode.toLowerCase() === code.toLowerCase() &&
             b.customerName.toLowerCase().includes(name.toLowerCase())
      );

      if (found) {
        openModal(found);
      } else {
        errorText.textContent = 'Booking tidak ditemukan. Pastikan kode booking dan nama sudah benar.';
        errorAlert.classList.remove('hidden');
      }

      isLoading = false;
      searchBtnText.textContent = 'Cari Booking';
      updateBtn();
    }, 800);
  }

  // --- Events ---
  bookingCodeEl.addEventListener('input', () => { updateBtn(); clearError(); });
  customerNameEl.addEventListener('input', () => { updateBtn(); clearError(); });
  searchBtn.addEventListener('click', checkBooking);

  bookingCodeEl.addEventListener('keydown', e => { if (e.key === 'Enter') customerNameEl.focus(); });
  customerNameEl.addEventListener('keydown', e => { if (e.key === 'Enter') checkBooking(); });

  // Only close modal via X button — clicking overlay does nothing
  modalCloseBtn.addEventListener('click', closeModal);

  // Prevent clicks inside modal from doing anything unintended
  document.getElementById('modal').addEventListener('click', e => e.stopPropagation());

  // ESC key closes modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal();
  });

  // --- Init ---
  renderBottomNav();
  updateBtn();
})();
</script>
</body>
</html>

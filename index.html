<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Jogja Rafting · Pesanan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    :root {
      --bg: #efefef;
      --surface: #ffffff;
      --border: #e2e2e2;
      --ink: #111111;
      --ink2: #333333;
      --ink3: #666666;
      --grey-50: #fafafa;
      --grey-100: #f4f4f4;
      --grey-200: #e9e9e9;
      --grey-300: #d4d4d4;
      --grey-400: #a3a3a3;
      --grey-500: #737373;
      --grey-600: #525252;
      --grey-700: #404040;
      --grey-800: #262626;
      --grey-900: #171717;
    }

    * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; }
    body { background: var(--bg); margin: 0; }

    .card {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 22px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .card-hover { transition: all 0.25s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 16px 36px rgba(0,0,0,0.09) !important; }

    .fade-in-up { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 99px; }

    /* ── SIDEBAR DESKTOP ── */
    .desktop-sidebar {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
      height: 100%;
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
      min-height: 0;
    }
    .desktop-sidebar.collapsed { width: 62px; }
    .desktop-sidebar.expanded  { width: 216px; }

    .sidebar-header {
      display: flex;
      align-items: center;
      height: 60px;
      padding: 0 12px;
      gap: 8px;
      border-bottom: 1px solid var(--grey-200);
      flex-shrink: 0;
      background: white;
      z-index: 10;
    }
    .desktop-sidebar.collapsed .sidebar-header { justify-content: center; padding: 0; }
    .desktop-sidebar.collapsed .sidebar-logo-area { display: none; }
    .desktop-sidebar.expanded  .sidebar-logo-area { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }

    .sidebar-nav {
      height: calc(100% - 120px);
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--grey-300) transparent;
      min-height: 0;
    }
    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 99px; }

    .nav-group {
      font-size: 9.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--grey-400);
      padding: 0 10px;
      white-space: nowrap;
      overflow: hidden;
      margin-top: 10px;
      margin-bottom: 4px;
      min-height: 20px;
    }
    .desktop-sidebar.collapsed .nav-group { display: none; }
    .desktop-sidebar.expanded  .nav-group { height: auto; opacity: 1; }

    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--grey-600);
      background: transparent;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: all 0.18s ease;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
    }
    .nav-btn:hover { background: var(--grey-100); color: var(--grey-900); }
    .nav-btn.active { background: var(--grey-100); color: var(--grey-900); font-weight: 700; }
    .nav-btn.active::before {
      content: '';
      position: absolute;
      left: 0; top: 25%; bottom: 25%;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--grey-700);
    }
    .desktop-sidebar.collapsed .nav-btn { justify-content: center; padding: 9px 0; }
    .desktop-sidebar.collapsed .nav-btn.active::before { display: none; }

    .nav-label { transition: all 0.25s; overflow: hidden; white-space: nowrap; }
    .desktop-sidebar.collapsed .nav-label { width: 0; opacity: 0; }
    .desktop-sidebar.expanded  .nav-label { width: auto; opacity: 1; }

    .nav-tooltip {
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--grey-900);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
    }
    .desktop-sidebar.collapsed .nav-btn:hover .nav-tooltip { opacity: 1; }

    .toggle-btn {
      width: 26px; height: 26px;
      flex-shrink: 0;
      border-radius: 7px;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--grey-500);
      background: transparent;
      cursor: pointer;
      transition: all 0.18s;
    }
    .toggle-btn:hover { background: var(--grey-100); color: var(--grey-800); border-color: var(--grey-300); }

    .sidebar-footer {
      flex-shrink: 0;
      border-top: 1px solid var(--grey-200);
      padding: 10px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
      background: white;
      z-index: 10;
    }
    .desktop-sidebar.collapsed .sidebar-footer { justify-content: center; }

    .profile-label { transition: all 0.25s; overflow: hidden; white-space: nowrap; }
    .desktop-sidebar.collapsed .profile-label { width: 0; opacity: 0; }
    .desktop-sidebar.expanded  .profile-label { width: auto; opacity: 1; }

    /* ── SIDEBAR MOBILE ── */
    .sidebar-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 40; opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
    .mobile-sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
      background: #fff;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 8px 0 32px rgba(0,0,0,0.1);
      display: flex; flex-direction: column;
      padding: 20px 14px 28px;
      border-radius: 0 20px 20px 0;
    }
    .mobile-sidebar.open { transform: translateX(0); }
    .mobile-nav-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .app-container {
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    main {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .sidebar-wrapper {
      display: flex;
      height: 100vh;
      padding: 20px;
      padding-right: 0;
      box-sizing: border-box;
    }
    @media (max-width: 767px) {
      .sidebar-wrapper {
        display: none;
      }
    }

    /* ── TABLE STYLES ── */
    .table-container {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--grey-50);
      padding: 12px 20px;
      text-align: left;
      font-weight: 700;
      font-size: 11px;
      color: var(--grey-500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--grey-200);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--grey-800); }
    thead th.sorted { color: var(--grey-900); }
    tbody td {
      padding: 14px 20px;
      border-bottom: 1px solid var(--grey-100);
      color: var(--grey-800);
      font-weight: 500;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; cursor: pointer; }
    tbody tr:hover { background: var(--grey-50); }
    tbody tr.today-highlight { background: #fffbeb; }
    tbody tr.today-highlight:hover { background: #fef3c7; }

    .sort-icon {
      display: inline-block;
      margin-left: 2px;
      font-size: 10px;
      opacity: 0.4;
    }
    .sorted .sort-icon { opacity: 1; }

    .action-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--grey-200);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: white;
      cursor: pointer;
      color: var(--grey-500);
      transition: all 0.15s;
      margin-right: 4px;
    }
    .action-btn:hover { background: var(--grey-100); color: var(--grey-800); border-color: var(--grey-300); }

    .pagination-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--grey-200);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: white;
      cursor: pointer;
      color: var(--grey-500);
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .pagination-btn:hover:not(.disabled) { background: var(--grey-100); color: var(--grey-800); }
    .pagination-btn.active { background: var(--grey-900); color: white; border-color: var(--grey-900); }
    .pagination-btn.disabled { opacity: 0.3; cursor: default; }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-dialog {
      background: white;
      border-radius: 24px;
      padding: 32px;
      max-width: 640px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 48px rgba(0,0,0,0.15);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .section-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--grey-400);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 480px) {
      .detail-grid { grid-template-columns: 1fr; }
    }

    .detail-item {
      background: var(--grey-50);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .detail-item.full {
      grid-column: 1 / -1;
    }

    .detail-item-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--grey-400);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .detail-item-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--grey-900);
    }
    .detail-item-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--grey-500);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 10px 24px;
      border-radius: 12px;
      background: var(--grey-900);
      color: white;
      font-weight: 700;
      font-size: 13px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary:hover { background: var(--grey-800); }
    .btn-secondary {
      padding: 10px 24px;
      border-radius: 12px;
      background: white;
      color: var(--grey-600);
      font-weight: 700;
      font-size: 13px;
      border: 1px solid var(--grey-200);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { background: var(--grey-50); }
    .btn-danger {
      padding: 10px 24px;
      border-radius: 12px;
      background: #fef2f2;
      color: #ef4444;
      font-weight: 700;
      font-size: 13px;
      border: 1px solid #fecaca;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-danger:hover { background: #fee2e2; }
    .btn-success {
      padding: 10px 24px;
      border-radius: 12px;
      background: #f0fdf4;
      color: #10b981;
      font-weight: 700;
      font-size: 13px;
      border: 1px solid #a7f3d0;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-success:hover { background: #dcfce7; }

    /* ── BADGES ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 1px solid transparent;
    }
    .status-pending { background: #f9fafb; color: #6b7280; border-color: #e5e7eb; }
    .status-paid { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
    .status-cancelled { background: #fef2f2; color: #ef4444; border-color: #fecaca; }
    .status-confirmed { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
    .status-completed { background: #f5f3ff; color: #7c3aed; border-color: #ddd6fe; }
    .status-failed { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

    .urgent-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── NEW DETAIL ROW STYLES ── */
    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--grey-100);
      margin: 0 -3px;
    }
    .detail-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--grey-600);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .detail-value {
      font-size: 13px;
      font-weight: 700;
      color: var(--grey-900);
      text-align: right;
    }
    .detail-sub {
      font-size: 10px;
      font-weight: 500;
      color: var(--grey-400);
      margin-top: 2px;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .timeline-item {
      padding-left: 20px;
      border-left: 2px solid var(--grey-200);
      position: relative;
    }
    .timeline-item.active {
      border-left-color: var(--grey-900);
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 4px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--grey-200);
    }
    .timeline-item.active::before {
      background: var(--grey-900);
    }

    /* ── CLEAN MODAL STYLES ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }

    .modal-container {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: modalIn 0.2s ease-out;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #f1f5f9;
      background: #fafbfc;
    }

    .btn-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-close:hover {
      background: #f1f5f9;
      color: #475569;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
    }

    .modal-body::-webkit-scrollbar {
      width: 4px;
    }

    .modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .modal-body::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .info-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem;
      transition: border-color 0.15s;
    }

    .info-card:hover {
      border-color: #cbd5e1;
    }

    .info-card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      color: #64748b;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.125rem 0.625rem;
      border-radius: 100px;
      font-size: 0.6875rem;
      font-weight: 600;
      line-height: 1.5;
      text-transform: uppercase;
      letter-spacing: 0.025em;
    }

    .badge-amber {
      background: #fef3c7;
      color: #b45309;
    }

    .badge-emerald {
      background: #d1fae5;
      color: #047857;
    }

    .badge-rose {
      background: #ffe4e6;
      color: #be123c;
    }

    .badge-sky {
      background: #e0f2fe;
      color: #0369a1;
    }

    .badge-indigo {
      background: #e0e7ff;
      color: #4338ca;
    }

    .badge-slate {
      background: #f1f5f9;
      color: #475569;
    }

    .timeline-compact {
      position: relative;
      padding-left: 1rem;
    }

    .timeline-compact::before {
      content: '';
      position: absolute;
      left: 4px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: #e2e8f0;
      border-radius: 1px;
    }

    .timeline-step {
      position: relative;
      padding: 0.25rem 0 0.25rem 0.75rem;
      margin-bottom: 0.25rem;
    }

    .timeline-step:last-child {
      margin-bottom: 0;
    }

    .timeline-dot {
      position: absolute;
      left: -0.625rem;
      top: 0.5rem;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e2e8f0;
      border: 2px solid white;
      z-index: 1;
    }

    .timeline-step.active .timeline-dot {
      background: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: 10px;
      font-size: 0.8125rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .btn-emerald {
      background: #10b981;
      color: white;
    }

    .btn-emerald:hover {
      background: #059669;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-rose {
      background: #f43f5e;
      color: white;
    }

    .btn-rose:hover {
      background: #e11d48;
      box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
    }

    .btn-indigo {
      background: #6366f1;
      color: white;
    }

    .btn-indigo:hover {
      background: #4f46e5;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-slate {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-slate:hover {
      background: #e2e8f0;
    }

    .btn-approve {
      background: #10b981;
      color: white;
      padding: 0.625rem 1rem;
      border-radius: 10px;
      font-size: 0.8125rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-approve:hover {
      background: #059669;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-reject {
      background: #f43f5e;
      color: white;
      padding: 0.625rem 1rem;
      border-radius: 10px;

    setup(props, { emit }) {

      const formatCurrency = (val) => 'Rp ' + Number(val).toLocaleString('id-ID');

        if (!d) return '-';
        return new Date(d).toLocaleDateString('id-ID', { weekday:'short', day:'numeric', month:'long', year:'numeric' });
      };
      const formatDateTime = (dt) => {
        if (!dt) return '-';
        return new Date(dt).toLocaleString('id-ID', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
      };

      const subtotal = computed(() => props.order.packagePrice * props.order.qty);
      const discountAmount = computed(() => {
        if (!props.order.promoCode) return 0;
        if (props.order.promoType === 'Percent') {
          return (subtotal.value * props.order.promoValue) / 100;
        }
        return props.order.promoValue;
      });
      const grandTotal = computed(() => Math.max(0, subtotal.value - discountAmount.value));

      const getStatusClass = (status) => {
        switch(status) {
          case 'Pending': return 'badge-amber';
          case 'Paid': return 'badge-emerald';
          case 'Cancelled': return 'badge-rose';
          case 'Confirmed': return 'badge-sky';
          case 'Completed': return 'badge-indigo';
          case 'Failed': return 'badge-rose';
          default: return 'badge-slate';
        }
      };

      const getTimeline = (order) => {
        const steps = [];
        steps.push({ label: 'Order Dibuat', date: '2025-07-10', active: true });
        if (order.paymentStatus === 'Paid') steps.push({ label: 'Pembayaran Lunas', date: '2025-07-12', active: true });
        else if (order.paymentStatus === 'Failed') steps.push({ label: 'Pembayaran Gagal', date: '2025-07-12', active: true });
        else steps.push({ label: 'Menunggu Pembayaran', active: order.orderStatus === 'Pending' });

        if (order.orderStatus === 'Confirmed' || order.orderStatus === 'Completed') steps.push({ label: 'Pesanan Dikonfirmasi', date: '2025-07-13', active: true });
        if (order.orderStatus === 'Completed') steps.push({ label: 'Selesai', date: order.date, active: true });
        if (order.orderStatus === 'Cancelled') steps.push({ label: 'Dibatalkan', active: true });
        return steps;
      };

      const canConfirm = computed(() => props.order.orderStatus === 'Pending' && props.order.paymentStatus === 'Paid');
      const canCancel = computed(() => ['Pending', 'Confirmed'].includes(props.order.orderStatus));
      const canComplete = computed(() => props.order.orderStatus === 'Confirmed');

      // Payment helpers
      const getStatusIcon = (status) => {
        switch(status) {
          case 'Paid': return icons.checkCircle;
          case 'Pending': return icons.clock;
          case 'Failed': return icons.xCircle;
          case 'Expired': return icons.xCircle;
          default: return '';

          case 'Paid': return 'text-emerald-600 bg-emerald-50 border-emerald-200';
          case 'Pending': return 'text-amber-600 bg-amber-50 border-amber-200';
          case 'Failed': return 'text-red-600 bg-red-50 border-red-200';
          case 'Expired': return 'text-gray-500 bg-gray-100 border-gray-200';
          default: return 'text-gray-500 bg-gray-100 border-gray-200';
        }
      };

      const midtransData = computed(() => {
        if (props.order.paymentMethod !== 'Midtrans') return null;
        return {
          transactionId: 'MD-' + Math.random().toString(36).substring(2, 10).toUpperCase(),
          paymentType: props.order.paymentStatus === 'Paid' ? 'bank_transfer' : 'gopay',
          midtransStatus: props.order.paymentStatus === 'Paid' ? 'settlement' : props.order.paymentStatus === 'Pending' ? 'pending' : 'expire',
          fraudStatus: props.order.paymentStatus === 'Paid' ? 'accept' : 'challenge'
        };
      });

      return { 
        activeTab, formatCurrency, formatDate, formatDateTime, getStatusClass, getTimeline, 
        canConfirm, canCancel, canComplete, subtotal, discountAmount, grandTotal, 
        getStatusIcon, getStatusColor, midtransData,

                  </button>
                  <button @click="emit('rejectPayment', order)" class="btn-reject flex-1 flex items-center justify-center gap-2">
                    <span v-html="icons.xCircle" style="width:16px;height:16px;"></span> Reject
                  </button>
                </div>
              </template>

              <!-- MIDTRANS -->
              <template v-if="order.paymentMethod === 'Midtrans' && midtransData">
                <div class="mt-3 pt-3 border-t border-gray-200">
                  <p class="text-xs font-bold text-blue-600 uppercase tracking-wider mb-2">Midtrans Info</p>
                  <div class="detail-row">
                    <span class="detail-label text-blue-600">Transaction ID</span>
                    <span class="detail-value text-xs font-mono text-gray-900">{{ midtransData.transactionId }}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label text-blue-600">Payment Type</span>
                    <span class="detail-value text-gray-900">{{ midtransData.paymentType }}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label text-blue-600">Auto Status</span>
                    <span class="detail-value text-gray-900">
                      <span :class="[
                        'inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-bold',
                        midtransData.midtransStatus === 'settlement' ? 'bg-emerald-100 text-emerald-700' :
                        midtransData.midtransStatus === 'pending' ? 'bg-amber-100 text-amber-700' :
                        midtransData.midtransStatus === 'expire' ? 'bg-red-100 text-red-600' :
                        'bg-gray-100 text-gray-500'
                      ]">
                        {{ midtransData.midtransStatus }}
                      </span>
                    </span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label text-blue-600">Fraud Status</span>
                    <span :class="[
                      'px-2 py-0.5 rounded-full text-[11px] font-bold',
                      midtransData.fraudStatus === 'accept' ? 'bg-emerald-100 text-emerald-700' : 
                      midtransData.fraudStatus === 'challenge' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-600'
                    ]">
                      {{ midtransData.fraudStatus }}
                    </span>
                  </div>
                </div>
              </template>
            </div>

            <!-- Notes di tab pembayaran -->
            <div v-if="order.notes" class="bg-amber-50 rounded-2xl p-4 mb-4 border border-amber-200/50">
              <p class="text-xs font-bold text-amber-600 uppercase tracking-wider mb-2 inline-flex items-center gap-1.5">
                <span v-html="icons.info" style="width:12px;height:12px;"></span> Catatan
              </p>
              <p class="text-sm text-amber-800">{{ order.notes }}</p>
            </div>

            <!-- Close button di tab pembayaran -->
            <button @click="emit('close')"
              class="w-full py-3 rounded-xl bg-gray-100 text-gray-600 font-bold text-sm hover:bg-gray-200 transition-all">
              Tutup
            </button>
          </div>

        </div>
      </div>
    `
  };

  /* ── MODAL KONFIRMASI ── */
  const ConfirmModal = {
    props: { type: String, order: Object },
    emits: ['confirm', 'cancel'],
    setup(props, { emit }) {
      const titles = { confirm: 'Konfirmasi Pesanan', cancel: 'Batalkan Pesanan', complete: 'Selesaikan Pesanan' };
      return { titles, emit, icons };
    },
    template: `
      <div class="modal-overlay" @click.self="emit('cancel')">
        <div class="modal-dialog" style="max-width:420px;">
          <h3 class="text-base font-bold text-gray-900 mb-2">{{ titles[type] }}</h3>
          <p class="text-sm text-gray-500 mb-6">Anda yakin ingin {{ type === 'cancel' ? 'membatalkan' : 'memproses' }} pesanan <strong>{{ order.invoice }}</strong>?</p>
          <div class="flex items-center gap-3 justify-end">
            <button @click="emit('cancel')" class="btn-secondary">Batal</button>
            <button @click="emit('confirm')" class="btn-primary">Ya, Lanjutkan</button>
          </div>
        </div>
      </div>
    `
  };

  /* ── APLIKASI ── */
  const App = {
    components: { Sidebar, MobileSidebar, OrderDetailModal, ConfirmModal },
    setup() {
      const activeNav = ref('orders');
      const sidebarOpen = ref(false);
      const sidebarExpanded = ref(true);
      const searchQuery = ref('');
      const filterOrderStatus = ref('Semua');
      const filterPaymentStatus = ref('Semua');
      const filterService = ref('Semua');
      const filterDate = ref('');
      const sortBy = ref('date');
      const sortDir = ref('desc');
      const currentPage = ref(1);

      const orders = ref([...ALL_ORDERS]);
      const detailOrder = ref(null);
      const confirmAction = ref(null);

      const filtered = computed(() => {
        let data = [...orders.value];
        if (filterOrderStatus.value !== 'Semua') data = data.filter(o => o.orderStatus === filterOrderStatus.value);
        if (filterPaymentStatus.value !== 'Semua') data = data.filter(o => o.paymentStatus === filterPaymentStatus.value);
        if (filterService.value !== 'Semua') data = data.filter(o => o.service === filterService.value);
        if (filterDate.value) data = data.filter(o => o.date === filterDate.value);
        if (searchQuery.value.trim()) {
          const q = searchQuery.value.toLowerCase();
          data = data.filter(o => o.invoice.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q));
        }
        data.sort((a,b) => {
          let valA = sortBy.value === 'date' ? new Date(a.date) : a.total;
          let valB = sortBy.value === 'date' ? new Date(b.date) : b.total;
          if (sortBy.value === 'invoice') { valA = a.invoice; valB = b.invoice; return sortDir.value === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA); }
          return sortDir.value === 'asc' ? valA - valB : valB - valA;
        });
        return data;
      });

      const totalPages = computed(() => Math.max(1, Math.ceil(filtered.value.length / PER_PAGE)));
      const paginated = computed(() => {
        const start = (currentPage.value - 1) * PER_PAGE;
        return filtered.value.slice(start, start + PER_PAGE);
      });

      const paginationRange = computed(() => {
        const total = totalPages.value; const current = currentPage.value; const range = [];
        if (total <= 7) { for (let i=1; i<=total; i++) range.push(i); }
        else { range.push(1); if (current > 3) range.push('...'); for (let i=Math.max(2, current-1); i<=Math.min(total-1, current+1); i++) range.push(i); if (current < total-2) range.push('...'); range.push(total); }
        return range;
      });

      const toggleSort = (col) => {
        if (sortBy.value === col) sortDir.value = sortDir.value === 'asc' ? 'desc' : 'asc';
        else { sortBy.value = col; sortDir.value = 'asc'; }
        currentPage.value = 1;
      };

      const goPage = (p) => { if (p>=1 && p<=totalPages.value) currentPage.value = p; };

      const formatCurrency = (val) => 'Rp ' + Number(val).toLocaleString('id-ID');
      const formatDate = (d) => d ? new Date(d).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' }) : '-';
      const isToday = (dateStr) => {
        if (!dateStr) return false;
        const today = new Date(); const d = new Date(dateStr);
        return d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
      };
      const isUrgent = (order) => order.orderStatus === 'Pending' && isToday(order.date) && order.notes && order.notes.toLowerCase().includes('urgent');

      const getOrderStatusClass = (status) => {
        switch(status) {
          case 'Pending': return 'status-pending';
          case 'Confirmed': return 'status-confirmed';
          case 'Cancelled': return 'status-cancelled';
          case 'Completed': return 'status-completed';
          default: return 'status-pending';
        }
      };

      const openDetail = (order) => { detailOrder.value = order; };
      const closeDetail = () => { detailOrder.value = null; };
      const handleAction = (payload) => { detailOrder.value = null; confirmAction.value = payload; };
      const executeAction = () => {
        if (!confirmAction.value) return;
        const { type, order } = confirmAction.value;
        const idx = orders.value.findIndex(o => o.id === order.id);
        if (idx === -1) return;
        if (type === 'confirm') orders.value[idx].orderStatus = 'Confirmed';
        else if (type === 'cancel') orders.value[idx].orderStatus = 'Cancelled';
        else if (type === 'complete') orders.value[idx].orderStatus = 'Completed';
        confirmAction.value = null;
      };
      const cancelAction = () => { confirmAction.value = null; };

      const approvePayment = (order) => {
        const idx = orders.value.findIndex(o => o.id === order.id);
        if (idx !== -1) {
          orders.value[idx].paymentStatus = 'Paid';
        }
        // Update detailOrder jika masih terbuka
        if (detailOrder.value && detailOrder.value.id === order.id) {
          detailOrder.value = orders.value[idx];
        }
      };

      const rejectPayment = (order) => {
        const idx = orders.value.findIndex(o => o.id === order.id);
        if (idx !== -1) {
          orders.value[idx].paymentStatus = 'Failed';
        }
        // Update detailOrder jika masih terbuka
        if (detailOrder.value && detailOrder.value.id === order.id) {
          detailOrder.value = orders.value[idx];
        }
      };

      return {
        activeNav, sidebarOpen, sidebarExpanded, icons,
        searchQuery, filterOrderStatus, filterPaymentStatus, filterService, filterDate,
        sortBy, sortDir, currentPage,
        filtered, paginated, totalPages, paginationRange,
        toggleSort, goPage,
        detailOrder, confirmAction,
        openDetail, closeDetail, handleAction, executeAction, cancelAction,
        approvePayment, rejectPayment,
        formatCurrency, formatDate, isToday, isUrgent, getOrderStatusClass,
      };
    },
    template: `
      <div class="min-h-screen" style="background:#efefef;">
        <MobileSidebar :active="activeNav" :open="sidebarOpen" @navigate="activeNav=$event" @close="sidebarOpen=false"/>
        <div class="app-container">
          <div class="sidebar-wrapper hidden md:block">
            <Sidebar :active="activeNav" :expanded="sidebarExpanded" @navigate="activeNav=$event" @toggle="sidebarExpanded=!sidebarExpanded"/>
          </div>
          <main class="flex-1 overflow-y-auto">
            <div class="p-4 md:p-6 pb-10 max-w-7xl mx-auto">
              <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 fade-in-up">
                <div class="flex items-center gap-3">
                  <button @click="sidebarOpen=true" class="md:hidden w-9 h-9 rounded-xl bg-white border border-gray-200 flex items-center justify-center text-gray-500"><span v-html="icons.menu"></span></button>
                  <div><h1 class="text-xl lg:text-2xl font-extrabold text-gray-900">Pesanan</h1><p class="text-xs text-gray-500 mt-0.5 font-medium">Kelola semua pesanan masuk</p></div>
                </div>
              </div>

              <!-- Kartu ringkasan: Total, Pending, Hari Ini, Selesai -->
              <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5 fade-in-up">
                <div class="card card-hover" style="padding:16px;"><p class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Total</p><p class="text-2xl font-extrabold text-gray-900">{{ filtered.length }}</p></div>
                <div class="card card-hover" style="padding:16px;"><p class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Pending</p><p class="text-2xl font-extrabold text-amber-600">{{ filtered.filter(o => o.orderStatus === 'Pending').length }}</p></div>
                <div class="card card-hover" style="padding:16px;"><p class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Hari Ini</p><p class="text-2xl font-extrabold text-emerald-600">{{ filtered.filter(o => isToday(o.date)).length }}</p></div>
                <div class="card card-hover" style="padding:16px;"><p class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Selesai</p><p class="text-2xl font-extrabold text-violet-600">{{ filtered.filter(o => o.orderStatus === 'Completed').length }}</p></div>
              </div>

              <!-- FILTER BAR (GRID 2 KOLOM DI MOBILE) -->
              <div class="card mb-5 fade-in-up" style="animation-delay:0.05s;">
                <div class="grid grid-cols-2 md:flex md:flex-row gap-3 items-start md:items-end">
                  
                  <!-- Cari (full width di mobile) -->
                  <div class="relative col-span-2 md:flex-1 md:min-w-[180px]">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Cari</label>
                    <div class="relative">
                      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"><span v-html="icons.search"></span></span>
                      <input v-model="searchQuery" type="text" placeholder="Invoice atau customer..."
                        class="pl-10 pr-4 py-2.5 rounded-xl bg-gray-50 text-sm text-gray-800 placeholder-gray-400 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent focus:bg-white w-full transition-all"/>
                    </div>
                  </div>

                  <!-- Status Pesanan -->
                  <div class="w-full">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Status</label>
                    <select v-model="filterOrderStatus"
                      class="w-full px-3 py-2.5 rounded-xl bg-gray-50 text-sm font-medium text-gray-700 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent focus:bg-white cursor-pointer">
                      <option value="Semua">Semua</option>
                      <option value="Pending">Pending</option>
                      <option value="Confirmed">Confirmed</option>
                      <option value="Cancelled">Cancelled</option>
                      <option value="Completed">Completed</option>
                    </select>
                  </div>

                  <!-- Status Bayar -->
                  <div class="w-full">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Bayar</label>
                    <select v-model="filterPaymentStatus"
                      class="w-full px-3 py-2.5 rounded-xl bg-gray-50 text-sm font-medium text-gray-700 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent focus:bg-white cursor-pointer">
                      <option value="Semua">Semua</option>
                      <option value="Paid">Lunas</option>
                      <option value="Pending">Belum</option>
                      <option value="Failed">Gagal</option>
                    </select>
                  </div>

                  <!-- Layanan -->
                  <div class="w-full">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Layanan</label>
                    <select v-model="filterService"
                      class="w-full px-3 py-2.5 rounded-xl bg-gray-50 text-sm font-medium text-gray-700 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent focus:bg-white cursor-pointer">
                      <option value="Semua">Semua</option>
                      <option value="Rafting">Arung Jeram</option>
                      <option value="VW Tour">Tur VW</option>
                      <option value="Outbound">Outbound</option>
                    </select>
                  </div>

                  <!-- Tanggal -->
                  <div class="w-full">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Tanggal</label>
                    <input v-model="filterDate" type="date"
                      class="w-full px-3 py-2.5 rounded-xl bg-gray-50 text-sm text-gray-700 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent focus:bg-white cursor-pointer"/>
                  </div>

                  <!-- Reset -->
                  <button @click="searchQuery='';filterOrderStatus='Semua';filterPaymentStatus='Semua';filterService='Semua';filterDate='';currentPage=1"
                    class="col-span-2 md:col-span-1 px-5 py-2.5 rounded-xl bg-gray-200 text-gray-600 font-semibold text-xs hover:bg-gray-300 transition-all flex-shrink-0 md:self-end">
                    Reset
                  </button>
                </div>
              </div>

              <!-- TABEL -->
              <div class="card fade-in-up" style="padding: 0; overflow: hidden;">
                <div class="table-container" style="border-radius: 20px; border: none;">
                  <table>
                    <thead>
                      <tr>
                        <th @click="toggleSort('invoice')" :class="{ sorted: sortBy === 'invoice' }">Invoice <span class="sort-icon" v-html="sortBy==='invoice' ? (sortDir==='asc' ? icons.arrowUp : icons.arrowDown) : icons.arrowUp"></span></th>
                        <th>Customer</th>
                        <th @click="toggleSort('date')" :class="{ sorted: sortBy === 'date' }">Tanggal <span class="sort-icon" v-html="sortBy==='date' ? (sortDir==='asc' ? icons.arrowUp : icons.arrowDown) : icons.arrowUp"></span></th>
                        <th>Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr v-for="order in paginated" :key="order.id" :class="{ 'today-highlight': isToday(order.date) }" @click="openDetail(order)">
                        <td>
                          <div class="flex items-center gap-2">
                            <span v-if="isUrgent(order)" class="urgent-dot" title="Urgent"></span>
                            <p class="text-sm font-extrabold text-gray-900">{{ order.invoice }}</p>
                          </div>
                          <p class="text-[11px] text-gray-400 font-medium mt-0.5">{{ order.service }}</p>
                        </td>
                        <td>
                          <p class="text-sm font-bold text-gray-800">{{ order.customer }}</p>
                          <p class="text-[11px] text-gray-400 font-medium">{{ order.package }}</p>
                        </td>
                        <td>
                          <div class="flex items-center gap-1.5">
                            <span v-html="icons.calendar" class="text-gray-400 flex-shrink-0"></span>
                            <span class="text-sm font-medium" :class="isToday(order.date) ? 'text-amber-600 font-bold' : 'text-gray-700'">{{ formatDate(order.date) }}</span>
                            <span v-if="isToday(order.date)" class="text-[10px] font-bold text-amber-500 bg-amber-50 px-1.5 py-0.5 rounded-full">HARI INI</span>
                          </div>
                          <p class="text-[11px] text-gray-400 font-medium mt-0.5">{{ order.time }}</p>
                        </td>
                        <td>
                          <span :class="['status-badge', getOrderStatusClass(order.orderStatus)]">{{ order.orderStatus }}</span>
                        </td>
                      </tr>
                      <tr v-if="paginated.length === 0">
                        <td colspan="4">
                          <div class="empty-state">
                            <div class="w-16 h-16 rounded-2xl bg-gray-100 flex items-center justify-center mx-auto mb-4 text-gray-400"><span v-html="icons.orders" style="width:28px;height:28px;"></span></div>
                            <h3 class="text-base font-bold text-gray-700 mb-1">Belum ada pesanan</h3>
                            <p class="text-sm text-gray-400">Pesanan akan muncul di sini setelah ada booking masuk.</p>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>

              <div v-if="totalPages > 1" class="flex items-center justify-between mt-5 fade-in-up">
                <span class="text-xs text-gray-400 font-medium">Halaman {{ currentPage }} dari {{ totalPages }}</span>
                <div class="flex items-center gap-1.5">
                  <button @click="goPage(currentPage-1)" :class="['pagination-btn', { disabled: currentPage === 1 }]"><span v-html="icons.chevLeft"></span></button>
                  <template v-for="p in paginationRange" :key="p">
                    <span v-if="p === '...'" class="px-1 text-gray-400 text-xs">...</span>
                    <button v-else @click="goPage(p)" :class="['pagination-btn', { active: currentPage === p }]">{{ p }}</button>
                  </template>
                  <button @click="goPage(currentPage+1)" :class="['pagination-btn', { disabled: currentPage === totalPages }]"><span v-html="icons.chevRight"></span></button>
                </div>
              </div>
            </div>
          </main>
        </div>

        <OrderDetailModal 
          v-if="detailOrder" 
          :order="detailOrder" 
          @close="closeDetail" 
          @action="handleAction" 
          @approvePayment="approvePayment" 
          @rejectPayment="rejectPayment" 
        />
        <ConfirmModal v-if="confirmAction" :type="confirmAction.type" :order="confirmAction.order" @confirm="executeAction" @cancel="cancelAction" />
      </div>
    `
  };

  createApp(App).mount('#app');
</script>
</body>
</html>

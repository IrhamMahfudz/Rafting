<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Jogja Rafting · Payments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    :root {
      --bg: #efefef;
      --surface: #ffffff;
      --surface2: #f7f7f7;
      --border: #e2e2e2;
      --ink: #111111;
      --ink2: #333333;
      --ink3: #666666;
      --ink4: #999999;
      --ink5: #cccccc;
      --grey-50: #fafafa;
      --grey-100: #f4f4f4;
      --grey-200: #e9e9e9;
      --grey-300: #d4d4d4;
      --grey-400: #a3a3a3;
      --grey-500: #737373;
      --grey-600: #525252;
      --grey-700: #404040;
      --grey-800: #262626;
      --grey-900: #171717;
    }

    * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; }
    body { background: var(--bg); margin: 0; }

    .card {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 22px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .fade-in-up { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 99px; }

    /* ── SIDEBAR DESKTOP ── */
    .desktop-sidebar {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
      height: 100%;
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
      min-height: 0;
    }
    .desktop-sidebar.collapsed { width: 62px; }
    .desktop-sidebar.expanded  { width: 216px; }

    .sidebar-header {
      display: flex;
      align-items: center;
      height: 60px;
      padding: 0 12px;
      gap: 8px;
      border-bottom: 1px solid var(--grey-200);
      flex-shrink: 0;
      background: white;
      z-index: 10;
    }
    .desktop-sidebar.collapsed .sidebar-header { justify-content: center; padding: 0; }
    .desktop-sidebar.collapsed .sidebar-logo-area { display: none; }
    .desktop-sidebar.expanded  .sidebar-logo-area { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }

    .sidebar-nav {
      height: calc(100% - 120px);
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--grey-300) transparent;
      min-height: 0;
    }
    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 99px; }

    .nav-group {
      font-size: 9.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--grey-400);
      padding: 0 10px;
      white-space: nowrap;
      overflow: hidden;
      margin-top: 10px;
      margin-bottom: 4px;
      min-height: 20px;
    }
    .desktop-sidebar.collapsed .nav-group {
      height: 0; opacity: 0; margin: 0; padding: 0;
      overflow: hidden; pointer-events: none; display: none;
    }
    .desktop-sidebar.expanded  .nav-group { height: auto; opacity: 1; }

    .nav-btn {
      width: 100%;
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      color: var(--grey-600); background: transparent;
      border: none; cursor: pointer; text-align: left;
      transition: all 0.18s ease;
      white-space: nowrap; overflow: hidden; position: relative;
    }
    .nav-btn:hover { background: var(--grey-100); color: var(--grey-900); }
    .nav-btn.active { background: var(--grey-100); color: var(--grey-900); font-weight: 700; }
    .nav-btn.active::before {
      content: '';
      position: absolute; left: 0; top: 25%; bottom: 25%;
      width: 3px; border-radius: 0 3px 3px 0; background: var(--grey-700);
    }
    .desktop-sidebar.collapsed .nav-btn { justify-content: center; padding: 9px 0; }
    .desktop-sidebar.collapsed .nav-btn.active::before { display: none; }

    .nav-label { transition: all 0.25s; overflow: hidden; white-space: nowrap; }
    .desktop-sidebar.collapsed .nav-label { width: 0; opacity: 0; }
    .desktop-sidebar.expanded  .nav-label { width: auto; opacity: 1; }

    .nav-tooltip {
      position: absolute; left: calc(100% + 10px); top: 50%;
      transform: translateY(-50%); background: var(--grey-900); color: #fff;
      font-size: 11px; font-weight: 600; padding: 4px 9px;
      border-radius: 8px; white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity 0.15s; z-index: 100;
    }
    .desktop-sidebar.collapsed .nav-btn:hover .nav-tooltip { opacity: 1; }

    .toggle-btn {
      width: 26px; height: 26px; flex-shrink: 0; border-radius: 7px;
      border: 1px solid var(--border); display: flex; align-items: center;
      justify-content: center; color: var(--grey-500); background: transparent;
      cursor: pointer; transition: all 0.18s;
    }
    .toggle-btn:hover { background: var(--grey-100); color: var(--grey-800); border-color: var(--grey-300); }

    .sidebar-footer {
      flex-shrink: 0; border-top: 1px solid var(--grey-200);
      padding: 10px 8px; display: flex; align-items: center; gap: 10px;
      overflow: hidden; background: white; z-index: 10;
    }
    .desktop-sidebar.collapsed .sidebar-footer { justify-content: center; }
    .profile-label { transition: all 0.25s; overflow: hidden; white-space: nowrap; }
    .desktop-sidebar.collapsed .profile-label { width: 0; opacity: 0; }
    .desktop-sidebar.expanded  .profile-label { width: auto; opacity: 1; }

    /* ── SIDEBAR MOBILE ── */
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
    .mobile-sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
      background: #fff; z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 8px 0 32px rgba(0,0,0,0.1);
      display: flex; flex-direction: column;
      padding: 20px 14px 28px; border-radius: 0 20px 20px 0;
    }
    .mobile-sidebar.open { transform: translateX(0); }
    .mobile-nav-scroll {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      min-height: 0; display: flex; flex-direction: column; gap: 1px;
    }

    .app-container { height: 100vh; display: flex; overflow: hidden; }
    main { flex: 1; overflow-y: auto; min-height: 0; }
    .sidebar-wrapper {
      display: flex; height: 100vh; padding: 20px;
      padding-right: 0; box-sizing: border-box;
    }
    @media (max-width: 767px) { .sidebar-wrapper { display: none; } }

    /* ── TABLE STYLES ── */
    .table-container {
      overflow-x: auto; border-radius: 16px;
      border: 1px solid var(--border); background: white;
    }
    table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    thead th {
      background: var(--grey-50); padding: 12px 16px;
      text-align: left; font-weight: 700; font-size: 11px;
      color: var(--grey-500); text-transform: uppercase;
      letter-spacing: 0.05em; border-bottom: 1px solid var(--grey-200);
      white-space: nowrap; cursor: pointer; user-select: none;
    }
    thead th:hover { color: var(--grey-800); }
    thead th.sorted { color: var(--grey-900); }
    tbody td {
      padding: 14px 16px; border-bottom: 1px solid var(--grey-100);
      color: var(--grey-800); font-weight: 500; vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; cursor: pointer; }
    tbody tr:hover { background: var(--grey-50); }

    .sort-icon {
      display: inline-block; margin-left: 2px;
      font-size: 10px; opacity: 0.4;
    }
    .sorted .sort-icon { opacity: 1; }

    .pagination-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: 1px solid var(--grey-200);
      display: inline-flex; align-items: center; justify-content: center;
      background: white; cursor: pointer; color: var(--grey-500);
      font-size: 12px; font-weight: 600; transition: all 0.15s;
    }
    .pagination-btn:hover:not(.disabled) { background: var(--grey-100); color: var(--grey-800); }
    .pagination-btn.active { background: var(--grey-900); color: white; border-color: var(--grey-900); }
    .pagination-btn.disabled { opacity: 0.3; cursor: default; }

    .empty-state { padding: 60px 20px; text-align: center; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 60; display: flex; align-items: center;
      justify-content: center; padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-dialog {
      background: white; border-radius: 24px; padding: 28px;
      max-width: 540px; width: 100%; max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 48px rgba(0,0,0,0.15);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--grey-100);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      font-size: 12px; font-weight: 600; color: var(--grey-500);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .detail-value {
      font-size: 13px; font-weight: 700; color: var(--grey-900);
      text-align: right;
    }

    .proof-img {
      width: 100%; max-height: 300px;
      object-fit: contain; border-radius: 12px;
      border: 1px solid var(--grey-200);
      background: var(--grey-50);
    }

    .btn-approve {
      padding: 10px 20px; border-radius: 12px;
      background: #10b981; color: white; font-weight: 700;
      font-size: 13px; border: none; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-approve:hover { background: #059669; }
    .btn-reject {
      padding: 10px 20px; border-radius: 12px;
      background: white; color: #ef4444; font-weight: 700;
      font-size: 13px; border: 1px solid #fecaca; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-reject:hover { background: #fef2f2; }
  </style>
</head>

  /* ── KOMPONEN MODAL DETAIL ── */
  const PaymentDetailModal = {
    props: { payment: Object },

    setup(props, { emit }) {

          case 'Pending': return icons.clock;

          case 'Paid': return 'text-emerald-600 bg-emerald-50 border-emerald-200';
          case 'Pending': return 'text-amber-600 bg-amber-50 border-amber-200';
          case 'Failed': return 'text-red-600 bg-red-50 border-red-200';
          case 'Expired': return 'text-gray-500 bg-gray-100 border-gray-200';
          default: return 'text-gray-500 bg-gray-100 border-gray-200';
        }
      };

      const getMethodIcon = (method) => {
        return method === 'Midtrans' ? icons.wallet : icons.bank;
      };

      return { emit, icons, formatCurrency, formatDate, getStatusIcon, getStatusColor, getMethodIcon };
    },
    template: `

            <div class="detail-row border-blue-100">

            </div>
            <div class="detail-row border-blue-100">
              <span class="detail-label text-blue-600">Payment Type</span>
              <span class="detail-value text-blue-900">{{ payment.paymentType }}</span>
            </div>
            <div class="detail-row border-blue-100">
              <span class="detail-label text-blue-600">Auto Status</span>
              <span class="detail-value text-blue-900">
                <span :class="[
                  'inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-bold',
                  payment.midtransStatus === 'settlement' ? 'bg-emerald-100 text-emerald-700' :
                  payment.midtransStatus === 'pending' ? 'bg-amber-100 text-amber-700' :

  /* ── APLIKASI ── */
  const App = {
    components: { Sidebar, MobileSidebar, PaymentDetailModal },
    setup() {
      const activeNav = ref('payments');
      const sidebarOpen = ref(false);
      const sidebarExpanded = ref(true);
      const searchQuery = ref('');
      const filterStatus = ref('Semua');
      const filterMethod = ref('Semua');
      const filterDateFrom = ref('');
      const filterDateTo = ref('');
      const sortBy = ref('date');
      const sortDir = ref('desc');
      const currentPage = ref(1);

      const payments = ref([...ALL_PAYMENTS]);
      const selectedPayment = ref(null);

      /* Filter + sort */
      const filtered = computed(() => {
        let data = [...payments.value];

        if (filterStatus.value !== 'Semua') {
          data = data.filter(p => p.status === filterStatus.value);
        }
        if (filterMethod.value !== 'Semua') {
          data = data.filter(p => p.method === filterMethod.value);
        }
        if (searchQuery.value.trim()) {
          const q = searchQuery.value.toLowerCase();
          data = data.filter(p =>
            p.invoice.toLowerCase().includes(q) ||
            p.customer.toLowerCase().includes(q) ||
            p.service.toLowerCase().includes(q)
          );
        }
        if (filterDateFrom.value) {
          data = data.filter(p => p.date >= filterDateFrom.value);
        }
        if (filterDateTo.value) {
          data = data.filter(p => p.date <= filterDateTo.value);
        }

        data.sort((a,b) => {
          let valA, valB;
          if (sortBy.value === 'date') {
            valA = new Date(a.date); valB = new Date(b.date);
            return sortDir.value === 'asc' ? valA - valB : valB - valA;
          }
          if (sortBy.value === 'amount') {
            valA = a.amount; valB = b.amount;
            return sortDir.value === 'asc' ? valA - valB : valB - valA;
          }
          if (sortBy.value === 'invoice') {
            valA = a.invoice; valB = b.invoice;
            return sortDir.value === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
          }
          return 0;
        });
        return data;
      });

      const totalPages = computed(() => Math.max(1, Math.ceil(filtered.value.length / PER_PAGE)));
      const paginated = computed(() => {
        const start = (currentPage.value - 1) * PER_PAGE;
        return filtered.value.slice(start, start + PER_PAGE);
      });

      const paginationRange = computed(() => {
        const total = totalPages.value;
        const current = currentPage.value;
        const range = [];
        if (total <= 7) {
          for (let i=1; i<=total; i++) range.push(i);
        } else {
          range.push(1);
          if (current > 3) range.push('...');
          for (let i=Math.max(2, current-1); i<=Math.min(total-1, current+1); i++) range.push(i);
          if (current < total-2) range.push('...');
          range.push(total);
        }
        return range;
      });

      const toggleSort = (col) => {
        if (sortBy.value === col) {
          sortDir.value = sortDir.value === 'asc' ? 'desc' : 'asc';
        } else {
          sortBy.value = col;
          sortDir.value = 'desc';
        }
        currentPage.value = 1;
      };

      const goPage = (p) => { if (p>=1 && p<=totalPages.value) currentPage.value = p; };

      const openDetail = (payment) => { selectedPayment.value = payment; };
      const closeDetail = () => { selectedPayment.value = null; };

      const approvePayment = (payment) => {
        const found = payments.value.find(p => p.id === payment.id);
        if (found) found.status = 'Paid';
        closeDetail();
      };

      const rejectPayment = (payment) => {
        const found = payments.value.find(p => p.id === payment.id);
        if (found) found.status = 'Failed';
        closeDetail();
      };

      const formatCurrency = (v) => 'Rp ' + Number(v).toLocaleString('id-ID');
      const formatDate = (d) => {
        if (!d) return '-';
        return new Date(d).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
      };

      const getStatusClass = (status) => {
        switch(status) {
          case 'Paid': return 'bg-emerald-50 text-emerald-700 border-emerald-200';
          case 'Pending': return 'bg-amber-50 text-amber-700 border-amber-200';
          case 'Failed': return 'bg-red-50 text-red-600 border-red-200';
          case 'Expired': return 'bg-gray-100 text-gray-500 border-gray-200';
          default: return 'bg-gray-100 text-gray-500 border-gray-200';
        }
      };
      const getStatusDot = (status) => {
        switch(status) {
          case 'Paid': return 'bg-emerald-500';
          case 'Pending': return 'bg-amber-500';
          case 'Failed': return 'bg-red-500';
          case 'Expired': return 'bg-gray-400';
          default: return 'bg-gray-400';
        }
      };

      return {
        activeNav, sidebarOpen, sidebarExpanded, icons,
        searchQuery, filterStatus, filterMethod,
        filterDateFrom, filterDateTo,
        sortBy, sortDir, currentPage,
        filtered, paginated, totalPages, paginationRange,
        toggleSort, goPage,
        selectedPayment,
        openDetail, closeDetail, approvePayment, rejectPayment,
        formatCurrency, formatDate, getStatusClass, getStatusDot,
      };
    },
    template: `
      <div class="min-h-screen" style="background:#efefef;">
        <MobileSidebar :active="activeNav" :open="sidebarOpen" @navigate="activeNav=$event" @close="sidebarOpen=false"/>
        <div class="app-container">
          <!-- Sidebar Desktop -->
          <div class="sidebar-wrapper hidden md:block">
            <Sidebar
              :active="activeNav"
              :expanded="sidebarExpanded"
              @navigate="activeNav=$event"

            />
          </div>

          <!-- Konten Utama -->
          <main class="flex-1 overflow-y-auto">
            <div class="p-4 md:p-6 pb-10 max-w-7xl mx-auto">

              <!-- Header -->
              <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 fade-in-up">
                <div class="flex items-center gap-3">
                  <button @click="sidebarOpen=true"
                    class="md:hidden w-9 h-9 rounded-xl bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-50 transition-all flex-shrink-0">
                    <span v-html="icons.menu"></span>
                  </button>
                  <div>
                    <h1 class="text-xl lg:text-2xl font-extrabold text-gray-900 tracking-tight leading-tight">Pembayaran</h1>
                    <p class="text-xs text-gray-500 mt-0.5 font-medium">Pantau semua transaksi pembayaran</p>
                  </div>
                </div>
                <div class="flex items-center gap-2 text-xs text-gray-400 font-medium flex-shrink-0">
                  <span v-html="icons.receipt" style="width:14px;height:14px;"></span>
                  {{ filtered.length }} transaksi
                </div>
              </div>

              <!-- FILTER BAR -->
              <div class="card mb-5 fade-in-up" style="animation-delay:0.05s;">
                <div class="flex flex-col md:flex-row gap-3 items-start md:items-end">
                  <!-- Search -->
                  <div class="relative flex-1 w-full">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Cari</label>
                    <div class="relative">
                      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"><span v-html="icons.search"></span></span>
                      <input v-model="searchQuery" type="text" placeholder="Invoice, customer, layanan..."
                        class="pl-10 pr-4 py-2.5 rounded-xl bg-gray-50 text-sm text-gray-800 placeholder-gray-400 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent focus:bg-white w-full transition-all"/>
                    </div>
                  </div>
                  <!-- Status -->
                  <div class="w-full md:w-36">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Status</label>
                    <select v-model="filterStatus"
                      class="w-full px-3 py-2.5 rounded-xl bg-gray-50 text-sm font-medium text-gray-700 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent focus:bg-white cursor-pointer">
                      <option value="Semua">Semua</option>
                      <option value="Paid">Paid</option>
                      <option value="Pending">Pending</option>
                      <option value="Failed">Failed</option>
                      <option value="Expired">Expired</option>
                    </select>
                  </div>
                  <!-- Method -->
                  <div class="w-full md:w-36">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Metode</label>
                    <select v-model="filterMethod"
                      class="w-full px-3 py-2.5 rounded-xl bg-gray-50 text-sm font-medium text-gray-700 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent focus:bg-white cursor-pointer">
                      <option value="Semua">Semua</option>
                      <option value="Midtrans">Midtrans</option>
                      <option value="Manual Transfer">Manual</option>
                    </select>
                  </div>
                  <!-- Date From -->
                  <div class="w-full md:w-40">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Dari Tgl</label>
                    <input v-model="filterDateFrom" type="date"
                      class="w-full px-3 py-2.5 rounded-xl bg-gray-50 text-sm text-gray-700 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent focus:bg-white cursor-pointer"/>
                  </div>
                  <!-- Date To -->
                  <div class="w-full md:w-40">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Sampai Tgl</label>
                    <input v-model="filterDateTo" type="date"
                      class="w-full px-3 py-2.5 rounded-xl bg-gray-50 text-sm text-gray-700 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent focus:bg-white cursor-pointer"/>
                  </div>
                  <!-- Reset -->
                  <button @click="searchQuery='';filterStatus='Semua';filterMethod='Semua';filterDateFrom='';filterDateTo='';currentPage=1"
                    class="px-4 py-2.5 rounded-xl bg-gray-200 text-gray-600 font-semibold text-xs hover:bg-gray-300 transition-all flex-shrink-0">
                    Reset
                  </button>
                </div>
              </div>

              <!-- Tabel -->
              <div class="card fade-in-up" style="animation-delay:0.1s; padding: 0; overflow: hidden;">
                <div class="table-container" style="border-radius: 20px; border: none;">
                  <table>
                    <thead>
                      <tr>
                        <th @click="toggleSort('invoice')" :class="{ sorted: sortBy === 'invoice' }">
                          Invoice <span class="sort-icon" v-html="sortBy==='invoice' ? (sortDir==='asc' ? icons.arrowUp : icons.arrowDown) : icons.arrowUp"></span>
                        </th>
                        <th>Customer</th>
                        <th>Service</th>
                        <th @click="toggleSort('amount')" :class="{ sorted: sortBy === 'amount' }">
                          Amount <span class="sort-icon" v-html="sortBy==='amount' ? (sortDir==='asc' ? icons.arrowUp : icons.arrowDown) : icons.arrowUp"></span>
                        </th>
                        <th>Method</th>
                        <th>Status</th>
                        <th @click="toggleSort('date')" :class="{ sorted: sortBy === 'date' }">
                          Date <span class="sort-icon" v-html="sortBy==='date' ? (sortDir==='asc' ? icons.arrowUp : icons.arrowDown) : icons.arrowUp"></span>
                        </th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr v-for="p in paginated" :key="p.id" @click="openDetail(p)">
                        <!-- Invoice -->
                        <td>
                          <span class="text-xs font-mono font-bold text-gray-800">{{ p.invoice }}</span>
                        </td>
                        <!-- Customer -->
                        <td>
                          <span class="text-sm font-semibold text-gray-800">{{ p.customer }}</span>
                        </td>
                        <!-- Service -->
                        <td>
                          <span class="text-sm text-gray-600">{{ p.service }}</span>
                        </td>
                        <!-- Amount -->
                        <td>
                          <span class="text-sm font-bold text-gray-900">{{ formatCurrency(p.amount) }}</span>
                        </td>
                        <!-- Method -->
                        <td>
                          <span :class="[
                            'inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-bold',
                            p.method === 'Midtrans'
                              ? 'bg-blue-50 text-blue-700 border border-blue-200'
                              : 'bg-amber-50 text-amber-700 border border-amber-200'
                          ]">
                            <span v-html="p.method === 'Midtrans' ? icons.wallet : icons.bank" style="width:11px;height:11px;"></span>
                            {{ p.method === 'Midtrans' ? 'Midtrans' : 'Manual' }}
                          </span>
                        </td>
                        <!-- Status -->
                        <td>
                          <span :class="[
                            'inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-bold',
                            getStatusClass(p.status)
                          ]">
                            <span :class="'w-1.5 h-1.5 rounded-full ' + getStatusDot(p.status)"></span>
                            {{ p.status }}
                          </span>
                        </td>
                        <!-- Date -->
                        <td>
                          <span class="text-sm text-gray-500 font-medium">{{ formatDate(p.date) }}</span>
                        </td>
                      </tr>
                      <!-- Empty State -->
                      <tr v-if="paginated.length === 0">
                        <td colspan="7">
                          <div class="empty-state">
                            <div class="w-16 h-16 rounded-2xl bg-gray-100 flex items-center justify-center mx-auto mb-4 text-gray-400">
                              <span v-html="icons.receipt" style="width:28px;height:28px;"></span>
                            </div>
                            <h3 class="text-base font-bold text-gray-700 mb-1">Tidak ada transaksi</h3>
                            <p class="text-sm text-gray-400">Coba ubah filter atau tanggal.</p>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>

              <!-- Pagination -->
              <div v-if="totalPages > 1" class="flex items-center justify-between mt-5 fade-in-up" style="animation-delay:0.15s">
                <span class="text-xs text-gray-400 font-medium">Halaman {{ currentPage }} dari {{ totalPages }} ({{ filtered.length }} transaksi)</span>
                <div class="flex items-center gap-1.5">
                  <button @click="goPage(currentPage-1)" :class="['pagination-btn', { disabled: currentPage === 1 }]">
                    <span v-html="icons.chevLeft"></span>
                  </button>
                  <template v-for="p in paginationRange" :key="p">
                    <span v-if="p === '...'" class="px-1 text-gray-400 text-xs">...</span>
                    <button v-else @click="goPage(p)" :class="['pagination-btn', { active: currentPage === p }]">{{ p }}</button>
                  </template>
                  <button @click="goPage(currentPage+1)" :class="['pagination-btn', { disabled: currentPage === totalPages }]">
                    <span v-html="icons.chevRight"></span>
                  </button>
                </div>
              </div>

            </div>
          </main>
        </div>

        <!-- Modal Detail -->
        <PaymentDetailModal
          v-if="selectedPayment"
          :payment="selectedPayment"
          @close="closeDetail"
          @approve="approvePayment"
          @reject="rejectPayment"
        />
      </div>
    `
  };

  createApp(App).mount('#app');
</script>
</body>
</html>

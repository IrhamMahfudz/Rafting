<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>Gallery – Jogja Rafting</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2f1ef;
      --surface: #ffffff;
      --ink: #111827;
      --ink-2: #374151;
      --ink-3: #6b7280;
      --ink-4: #9ca3af;
      --ink-5: #d1d5db;
      --nav-h: 76px;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
    }
    body {
      font-family: 'DM Sans', sans-serif;
    }
    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .app-shell {
      display: flex; width: 100%; height: 100%;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar { display: none; }
    @media(min-width: 1024px) {
      .sidebar {
        display: flex; flex-direction: column; align-items: center;
        justify-content: space-between; width: 80px; min-height: 100vh;
        background: var(--surface); box-shadow: 1px 0 0 var(--ink-5);
        padding: 28px 0; flex-shrink: 0; z-index: 50;
        position: sticky; top: 0; height: 100vh;
      }
      .sidebar-logo {
        font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800;
        letter-spacing: 2px; color: var(--ink);
        writing-mode: vertical-rl; transform: rotate(180deg);
        text-decoration: none;
      }
      .sidebar-nav {
        display: flex; flex-direction: column; gap: 8px; align-items: center;
      }
      .sidebar-nav-item {
        width: 46px; height: 46px; border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: background .2s; text-decoration: none;
      }
      .sidebar-nav-item.active { background: var(--ink); }
      .sidebar-nav-item.active svg { stroke: #fff; }
      .sidebar-nav-item:not(.active) svg { stroke: var(--ink-4); }
      .sidebar-nav-item:not(.active):hover { background: var(--bg); }
      .sidebar-avatar {
        width: 38px; height: 38px; border-radius: 50%;
        background: linear-gradient(135deg, #374151, #111827);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
      }
    }

    /* ── MAIN ── */
    .main-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; position: relative; min-width: 0;
      height: 100vh;
    }
    .scroll-content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 16px));
    }
    @media(min-width: 1024px) { .scroll-content { padding-bottom: 32px; } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .inner {
      max-width: 960px; margin: 0 auto;
      padding: 0 20px;
    }
    @media(min-width: 640px) { .inner { padding: 0 32px; } }
    @media(min-width: 1024px) { .inner { padding: 0 40px; } }

    /* ── HEADER ── */
    .header { padding: max(24px, 4vh) 0 24px; }
    .header-label {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      color: var(--ink-2); letter-spacing: 2px; margin-bottom: 8px;
    }
    .header-title {
      font-family: 'Syne', sans-serif; font-size: clamp(26px, 5vw, 40px);
      font-weight: 800; line-height: 1.05; color: var(--ink);
    }

    /* ── MASONRY GALLERY ── */
    .gallery-masonry {
      columns: 2; column-gap: 10px; margin-bottom: 40px;
    }
    @media(min-width: 540px) {
      .gallery-masonry { columns: 3; column-gap: 12px; }
    }
    @media(min-width: 900px) {
      .gallery-masonry { columns: 4; column-gap: 14px; }
    }

    .gi {
      break-inside: avoid;
      display: block; border-radius: 14px; overflow: hidden;
      cursor: pointer; position: relative; background: var(--surface);
      margin-bottom: 10px;
      transition: transform .25s ease, box-shadow .25s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    @media(min-width: 540px) { .gi { margin-bottom: 12px; border-radius: 16px; } }
    @media(min-width: 900px) { .gi { margin-bottom: 14px; border-radius: 18px; } }

    .gi:hover {
      transform: scale(1.025);
      box-shadow: 0 12px 40px rgba(0,0,0,.18);
      z-index: 2;
    }
    .gi img {
      width: 100%; height: auto; display: block;
      transition: transform .4s ease;
      position: relative; z-index: 1;
      /* Aspek rasio gambar dipertahankan, landscape/portrait tampil alami */
    }
    .gi:hover img { transform: scale(1.06); }

    /* shimmer skeleton */
    .gi::before {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(17,24,39,.95);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .3s ease;
      padding: 20px;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox-inner {
      position: relative; max-width: min(90vw, 900px); max-height: 90vh;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-img {
      max-width: 100%; max-height: 85vh; border-radius: 20px;
      box-shadow: 0 40px 120px rgba(0,0,0,.6);
      object-fit: contain;
      transform: scale(.92);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    }
    .lightbox.open .lightbox-img { transform: scale(1); }
    .lightbox-close {
      position: fixed; top: 20px; right: 20px;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.12); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; backdrop-filter: blur(8px);
    }
    .lightbox-close:hover { background: rgba(255,255,255,.22); }
    .lightbox-close svg { stroke: white; }
    .lightbox-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.12); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; backdrop-filter: blur(8px);
    }
    .lightbox-nav:hover { background: rgba(255,255,255,.22); }
    .lightbox-nav svg { stroke: white; }
    .lightbox-prev { left: 12px; }
    .lightbox-next { right: 12px; }
    .lightbox-counter {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.5); font-size: 12px; font-weight: 600;
      letter-spacing: 2px; font-family: 'Syne', sans-serif;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav-wrapper {
      display: block; position: fixed; bottom: 0; left: 0; right: 0;
      padding: 0 20px;
      padding-bottom: max(14px, env(safe-area-inset-bottom, 14px));
      z-index: 100; background: transparent; pointer-events: none;
    }
    @supports(padding-bottom: env(safe-area-inset-bottom)) {
      .bottom-nav-wrapper { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
    }
    .bottom-nav {
      max-width: 480px; margin: 0 auto; background: white; border-radius: 99px;
      box-shadow: 0 8px 40px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.07);
      padding: 10px 20px; display: flex; align-items: center;
      justify-content: space-around; pointer-events: all;
    }
    @media(min-width: 640px) { .bottom-nav { max-width: 560px; padding: 12px 32px; } }
    @media(min-width: 1024px) { .bottom-nav-wrapper { display: none; } }
    .nav-item {
      width: 46px; height: 46px; border-radius: 99px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .2s; text-decoration: none;
    }
    .nav-item.active { background: var(--ink); }
    .nav-item.active svg { stroke: white; }
    .nav-item:not(.active) svg { stroke: var(--ink-4); }
  </style>
</head>
<body>
<div id="app">
  <div class="app-shell">

    <!-- SIDEBAR DESKTOP -->
    <aside class="sidebar">
      <a href="index.html" class="sidebar-logo">JOGJA RAFTING</a>
      <nav class="sidebar-nav" aria-label="Navigasi utama">
        <a href="index.html" class="sidebar-nav-item" data-nav="home" aria-label="Home" title="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <a href="gallery.html" class="sidebar-nav-item active" data-nav="gallery" aria-label="Gallery" title="Gallery">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </a>
        <a href="gallery.html" class="sidebar-nav-item" data-nav="promo" aria-label="Promo" title="Promo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41L11 3H4v7l9.59 9.59a2 2 0 0 0 2.82 0l4.18-4.18a2 2 0 0 0 0-2.82z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>
        </a>
        <a href="cek-booking.html" class="sidebar-nav-item" data-nav="cek-booking" aria-label="Cek Booking" title="Cek Booking">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </a>
        <a href="contact.html" class="sidebar-nav-item" data-nav="contact" aria-label="Contact" title="Contact">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </a>
      </nav>
      <div class="sidebar-avatar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </aside>

    <!-- MAIN AREA -->
    <main class="main-area">
      <div class="scroll-content no-scrollbar">
        <div class="inner">
          <header class="header">
            <div class="header-label">JOGJA RAFTING</div>
            <div class="header-title">Gallery</div>
          </header>

          <!-- Galeri Masonry: jumlah landscape & portrait disetarakan -->
          <div class="gallery-masonry" id="galleryGrid"></div>
        </div>
      </div>

      <!-- LIGHTBOX -->
      <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
        <div class="lightbox-inner">
          <img class="lightbox-img" id="lightboxImg" src="" alt="Foto" />
        </div>
        <button class="lightbox-close" id="lbClose" aria-label="Tutup">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="lightbox-nav lightbox-prev" id="lbPrev" aria-label="Sebelumnya">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="lightbox-nav lightbox-next" id="lbNext" aria-label="Selanjutnya">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <div class="lightbox-counter" id="lbCounter"></div>
      </div>

      <!-- BOTTOM NAV MOBILE -->
      <div class="bottom-nav-wrapper">
        <nav class="bottom-nav">
          <a href="home.html" class="nav-item" data-nav="home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </a>
          <a href="gallery.html" class="nav-item active" data-nav="gallery">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </a>
          <a href="promo.html" class="nav-item" data-nav="promo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41L11 3H4v7l9.59 9.59a2 2 0 0 0 2.82 0l4.18-4.18a2 2 0 0 0 0-2.82z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>
          </a>
          <a href="contact.html" class="nav-item" data-nav="contact">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </a>
        </nav>
      </div>
    </main>
  </div>
</div>

<script>
  /* ══════════════════════════════════════════════════════════════════
     GALLERY DATA – JUMLAH LANDSCAPE & PORTRAIT SEIMBANG
     Total 18 foto: 9 landscape (rasio lebar) + 9 portrait (rasio tinggi)
     Menggunakan parameter URL Unsplash untuk memastikan orientasi.
  ═══════════════════════════════════════════════════════════════════ */
  const ALL_PHOTOS = [
    // ── 9 Foto Landscape (orientasi horizontal) ─────────────────
    { id: 1,  src: 'https://images.unsplash.com/photo-1530866495561-507c9faab2ed?w=900&h=600&fit=crop&auto=format', category: 'Rafting' },
    { id: 2,  src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&h=600&fit=crop&auto=format', category: 'Rafting' },
    { id: 3,  src: 'https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=900&h=600&fit=crop&auto=format', category: 'Rafting' },
    { id: 4,  src: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=900&h=600&fit=crop&auto=format', category: 'Rafting' },
    { id: 5,  src: 'https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=900&h=600&fit=crop&auto=format', category: 'VW Tour' },
    { id: 6,  src: 'https://images.unsplash.com/photo-1502877338535-766e1452684a?w=900&h=600&fit=crop&auto=format', category: 'VW Tour' },
    { id: 7,  src: 'https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=900&h=600&fit=crop&auto=format', category: 'VW Tour' },
    { id: 8,  src: 'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=900&h=600&fit=crop&auto=format', category: 'Outbound' },
    { id: 9,  src: 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=900&h=600&fit=crop&auto=format', category: 'Outbound' },

    // ── 9 Foto Portrait (orientasi vertikal) ────────────────────
    { id: 10, src: 'https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=600&h=900&fit=crop&auto=format', category: 'Rafting' },
    { id: 11, src: 'https://images.unsplash.com/photo-1472396961693-142e6e269027?w=600&h=900&fit=crop&auto=format', category: 'Rafting' },
    { id: 12, src: 'https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=600&h=900&fit=crop&auto=format', category: 'VW Tour' },
    { id: 13, src: 'https://images.unsplash.com/photo-1508974239320-0a029497e820?w=600&h=900&fit=crop&auto=format', category: 'VW Tour' },
    { id: 14, src: 'https://images.unsplash.com/photo-1551632436-cbf8dd35adfa?w=600&h=900&fit=crop&auto=format', category: 'Outbound' },
    { id: 15, src: 'https://images.unsplash.com/photo-1539635278303-d4002c07eae3?w=600&h=900&fit=crop&auto=format', category: 'Outbound' },
    { id: 16, src: 'https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=600&h=900&fit=crop&auto=format', category: 'Outbound' },
    { id: 17, src: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&h=900&fit=crop&auto=format', category: 'Rafting' },
    { id: 18, src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&h=900&fit=crop&auto=format', category: 'Rafting' },
  ];

  let activeIndex = 0;

  /* ── Render Grid ── */
  function renderGrid() {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';

    ALL_PHOTOS.forEach((photo, idx) => {
      const el = document.createElement('div');
      el.className = 'gi';
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', `Buka foto ${photo.category} ${idx + 1}`);

      const img = document.createElement('img');
      img.src = photo.src;
      img.alt = `Foto ${photo.category} - orientasi ${idx < 9 ? 'landscape' : 'portrait'}`;
      img.loading = 'lazy';
      img.decoding = 'async';

      el.appendChild(img);
      el.addEventListener('click', () => openLightbox(idx));
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') openLightbox(idx);
      });

      grid.appendChild(el);
    });
  }

  /* ── Lightbox ── */
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightboxImg');
  const lbClose = document.getElementById('lbClose');
  const lbPrev = document.getElementById('lbPrev');
  const lbNext = document.getElementById('lbNext');
  const lbCounter = document.getElementById('lbCounter');

  function openLightbox(idx) {
    activeIndex = idx;
    updateLightbox();
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const p = ALL_PHOTOS[activeIndex];
    lbImg.src = p.src;
    lbImg.alt = `Foto ${p.category}`;
    lbCounter.textContent = `${activeIndex + 1} / ${ALL_PHOTOS.length}`;
    lbPrev.style.display = activeIndex === 0 ? 'none' : 'flex';
    lbNext.style.display = activeIndex === ALL_PHOTOS.length - 1 ? 'none' : 'flex';
  }

  function prevPhoto() {
    if (activeIndex > 0) { activeIndex--; updateLightbox(); }
  }
  function nextPhoto() {
    if (activeIndex < ALL_PHOTOS.length - 1) { activeIndex++; updateLightbox(); }
  }

  lbClose.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click', prevPhoto);
  lbNext.addEventListener('click', nextPhoto);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevPhoto();
    if (e.key === 'ArrowRight') nextPhoto();
  });

  let touchStartX = 0;
  lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) dx < 0 ? nextPhoto() : prevPhoto();
  }, { passive: true });

  /* ── Init ── */
  renderGrid();
</script>
</body>
</html>
